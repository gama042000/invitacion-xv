<!DOCTYPE html>
<html lang="es">
<head>
 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XV Rocío Angélica</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
text-align:center;
background:linear-gradient(#e6f2ff,#ffffff);
background-image:url("https://www.transparenttextures.com/patterns/floral-white.png");
overflow-x:hidden;
}

.marco{
border:8px solid #0b2a6b;
border-radius:25px;
margin:10px;
padding:15px;
}

.sobre{
width:260px;
height:170px;
background:#0b2a6b;
margin:80px auto;
position:relative;
cursor:pointer;
border-radius:10px;
}

.tapa{
position:absolute;
top:0;
left:0;
width:0;
height:0;
border-left:130px solid transparent;
border-right:130px solid transparent;
border-top:85px solid #173f9b;
transform-origin:top;
transition:1s;
}

.carta{
position:absolute;
top:20px;
left:10px;
right:10px;
background:white;
padding:20px;
border-radius:10px;
transform:translateY(100px);
opacity:0;
transition:1s;
}

.abierto .tapa{
transform:rotateX(180deg);
}

.abierto .carta{
transform:translateY(-60px);
opacity:1;
}

.tarjeta{
max-width:500px;
margin:auto;
}
.seccion{
min-height:80vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:40px;
opacity:0;
transform:translateY(40px);
transition:all 1s;
}

.seccion.visible{
opacity:1;
transform:translateY(0);
}
h1{
font-family:'Great Vibes',cursive;
font-size:60px;
color:#0b2a6b;
}

h2{
font-family:'Poppins',sans-serif;
font-weight:600;
}

.boton{
display:inline-block;
margin:10px;
padding:12px 20px;
border-radius:25px;
text-decoration:none;
color:white;
font-size:16px;
}

.maps{background:#1a4fa3;}
.whatsapp{background:#25D366;}

#contador{
font-size:22px;
margin:15px;
color:#0b2a6b;
}

.galeria img{
width:100%;
max-width:200px;
margin:8px;
border-radius:15px;
}

.flor{
position:fixed;
top:-50px;
font-size:24px;
animation:caer linear infinite;
color:#4da6ff;
}

@keyframes caer{
0%{transform:translateY(-50px) rotate(0deg);}
100%{transform:translateY(100vh) rotate(360deg);}
}

@media(max-width:600px){
h1{font-size:30px;}
p{font-size:18px;}
}

</style>
</head>

<body>

<div class="marco">

<div class="sobre" onclick="abrirSobre()" id="sobre">
<div class="tapa"></div>
<div class="carta">
<h3>Bienvenido a</h3>
<p>Mis XV Años</p>
</div>
</div>

<div id="invitacion" style="display:none;">

<section class="seccion tarjeta">

<h1>Mis XV Años</h1>
<h2>Rocío Angélica</h2>

</section>

<section class="seccion tarjeta">

<p>27 de junio de 2026</p>
<p><b>Hora:</b> ________</p>

</section>

<section class="seccion tarjeta">

<p>Dirección:</p>

<p>
Calle 10 mz 26 lote 48<br>
Colonia Arturo Montiel
</p>

<p><b>Salón:</b> Tercera Cielo</p>

</section>

<br>

<section class="seccion tarjeta">

<p>Con la bendición de mis padres</p>

<p>
<b>Julio César</b><br>
y<br>
<b>Selene García de León</b>
</p>

</section>

<div id="contador"></div>

<section class="seccion tarjeta">

<a class="boton maps"
href="https://www.google.com/maps?q=19.427222,-98.988111"
target="_blank">
Ver ubicación
</a>

<a class="boton whatsapp"
href="https://wa.me/5215612966878?text=Confirmo%20mi%20asistencia%20a%20los%20XV%20de%20Rocío%20Angélica"
target="_blank">
Confirma tu asistencia
</a>

</section>

<div class="galeria">

<h3>Galería</h3>

<img src="foto1.jpg">
<img src="foto2.jpg">
<img src="foto3.jpg">

</div>

</div>

</div>

<audio autoplay loop controls>
<source src="musica.mp3" type="audio/mpeg">
</audio>

<script>

function abrirSobre(){
document.getElementById("sobre").classList.add("abierto");
setTimeout(()=>{
document.getElementById("invitacion").style.display="block";
},800);
}

/* contador (se activará cuando pongas la hora exacta) */

var fechaEvento=new Date("Jun 27, 2026 19:00:00").getTime();

setInterval(function(){

var ahora=new Date().getTime();
var distancia=fechaEvento-ahora;

var dias=Math.floor(distancia/(1000*60*60*24));
var horas=Math.floor((distancia%(1000*60*60*24))/(1000*60*60));
var minutos=Math.floor((distancia%(1000*60*60))/(1000*60));
var segundos=Math.floor((distancia%(1000*60))/1000);

document.getElementById("contador").innerHTML=
dias+" días "+horas+"h "+minutos+"m "+segundos+"s";

},1000);

function crearFlor(){
var flor=document.createElement("div");
flor.classList.add("flor");
flor.innerHTML="🌸";
flor.style.left=Math.random()*100+"vw";
flor.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(flor);
setTimeout(()=>{flor.remove();},8000);
}

setInterval(crearFlor,500);
const secciones=document.querySelectorAll(".seccion");

function mostrarSecciones(){

const trigger=window.innerHeight*0.8;

secciones.forEach(sec=>{
const top=sec.getBoundingClientRect().top;

if(top<trigger){
sec.classList.add("visible");
}

});

}

window.addEventListener("scroll",mostrarSecciones);

mostrarSecciones();
</script>

</body>
</html>
